name: wpp-autoflow

services:
  postgres:
    image: postgres:15-alpine
    container_name: wpp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wpp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wpp_pass}
      POSTGRES_DB: ${POSTGRES_DB:-wpp_autoflow}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-wpp_user}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wpp_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: wpp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3

  evolution-api:
    image: atendai/evolution-api:latest
    container_name: wpp_evolution
    restart: unless-stopped
    ports:
      - '${EVOLUTION_PORT:-8080}:8080'
    environment:
      SERVER_URL: http://localhost:${EVOLUTION_PORT:-8080}
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution_secret_key}
      # Database
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER:-wpp_user}:${POSTGRES_PASSWORD:-wpp_pass}@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_api
      DATABASE_SAVE_DATA_INSTANCE: 'true'
      DATABASE_SAVE_DATA_NEW_MESSAGE: 'true'
      DATABASE_SAVE_MESSAGE_UPDATE: 'true'
      DATABASE_SAVE_DATA_CONTACTS: 'true'
      DATABASE_SAVE_DATA_CHATS: 'true'
      DATABASE_SAVE_DATA_LABELS: 'true'
      DATABASE_SAVE_DATA_HISTORIC: 'true'
      # Redis
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: 'false'
      # QR Code
      QRCODE_LIMIT: 30
      QRCODE_COLOR: '#198754'
      # WebSocket (habilita Socket.IO para receber eventos em tempo real)
      WEBSOCKET_ENABLED: 'true'
      WEBSOCKET_GLOBAL_EVENTS: 'true'
      # Versão atualizada do WhatsApp Web (evita loop de restart)
      CONFIG_SESSION_PHONE_VERSION: '2.3000.1035194821'
      # Webhook
      WEBHOOK_GLOBAL_ENABLED: 'false'
      # Log
      LOG_LEVEL: ERROR,WARN,DEBUG,INFO,LOG,VERBOSE
      LOG_COLOR: 'true'
    volumes:
      - evolution_data:/evolution/instances
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080']
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wpp_app
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  minio_data:
  evolution_data:
